<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111116" />
      <stop offset="100%" stop-color="#050507" />
    </radialGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e55026" stop-opacity="0.32" />
      <stop offset="50%" stop-color="#111115" stop-opacity="0" />
      <stop offset="100%" stop-color="#e55026" stop-opacity="0.08" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Dark Cosmic Canvas -->
  <rect width="1200" height="800" fill="url(#bgGrad)" />
  <rect width="1200" height="800" fill="url(#glowGrad)" />
  <rect width="1200" height="800" fill="url(#grid)" />

  <!-- Accent glow spots -->
  <circle cx="600" cy="400" r="320" fill="#e55026" opacity="0.04" filter="blur(60px)" />

  <!-- Diagonal Aesthetic lines -->
  <path d="M-100 200 L1300 600" stroke="#e55026" stroke-opacity="0.1" stroke-width="1.5" />
  <path d="M-100 240 L1300 640" stroke="#e55026" stroke-opacity="0.04" stroke-width="1" />
  
  <!-- Cyber-Grid concentric decoration -->
  <circle cx="600" cy="400" r="180" fill="none" stroke="#e55026" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="16, 24" />
  <circle cx="600" cy="400" r="280" fill="none" stroke="#e55026" stroke-opacity="0.06" stroke-width="1" />
  <circle cx="600" cy="400" r="380" fill="none" stroke="#e55026" stroke-opacity="0.03" stroke-width="1" stroke-dasharray="4, 12" />

  <!-- Console tech info overlay center-left -->
  <g transform="translate(150, 240)">
    <!-- Console ID Badge -->
    <rect width="110" height="24" rx="4" fill="#e55026" fill-opacity="0.12" stroke="#e55026" stroke-opacity="0.4" stroke-width="1" />
    <text x="55" y="16" fill="#e55026" font-family="monospace" font-size="10" font-weight="900" letter-spacing="2" text-anchor="middle">DREAMCAST</text>

    <!-- Main Title text -->
    <text x="0" y="70" fill="#ffffff" font-family="'Space Grotesk', system-ui, sans-serif" font-size="44" font-weight="900" opacity="0.9" letter-spacing="-1">SEGA DREAMCAST</text>
    
    <!-- Subtitle descriptor -->
    <text x="0" y="105" fill="#a1a1aa" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="4">128-BIT SWIRL ADVENTURE</text>
    
    <!-- Horizontal timeline divider -->
    <path d="M 0 130 L 400 130" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    
    <!-- Vertical Specification statistics -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" fill="#e55026" font-family="monospace" font-size="10" font-weight="900" letter-spacing="1">FABRICANTE :</text>
      <text x="130" y="0" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold" opacity="0.8">SEGA</text>

      <text x="0" y="25" fill="#e55026" font-family="monospace" font-size="10" font-weight="900" letter-spacing="1">CPU RETRO :</text>
      <text x="130" y="25" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold" opacity="0.8">Hitachi SH-4 200MHz</text>

      <text x="0" y="50" fill="#e55026" font-family="monospace" font-size="10" font-weight="900" letter-spacing="1">CHIP GRAFICO :</text>
      <text x="130" y="50" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold" opacity="0.8">NEC PowerVR2 CLX2</text>

      <text x="0" y="75" fill="#e55026" font-family="monospace" font-size="10" font-weight="900" letter-spacing="1">LANCAMENTO :</text>
      <text x="130" y="75" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold" opacity="0.8">1998 AC</text>
    </g>
  </g>

  <!-- Technical border corners -->
  <g stroke="#e55026" stroke-opacity="0.3" stroke-width="1.5" fill="none">
    <path d="M 30 50 L 30 30 L 50 30" />
    <path d="M 1170 50 L 1170 30 L 1150 30" />
    <path d="M 30 750 L 30 770 L 50 770" />
    <path d="M 1170 750 L 1170 770 L 1150 770" />
  </g>

  <!-- Watermark details right-bottom -->
  <text x="1150" y="755" fill="#a1a1aa" font-family="monospace" font-size="9" font-weight="bold" letter-spacing="1.5" text-anchor="end" opacity="0.25">RECALBOX HUB SPECIFICATION SYSTEM - v6.2</text>
  <text x="1150" y="770" fill="#a1a1aa" font-family="monospace" font-size="8" text-anchor="end" opacity="0.15">SECURE OFFLINE SYSTEM ROM CARTRIDGES MOUNTED</text>
</svg>